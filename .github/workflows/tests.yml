name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main   

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run lint
        uses: dagger/dagger-for-github@v8.3.0
        with:
          module: .
          args: lint  
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4           
      - name: Run tests
        uses: dagger/dagger-for-github@v8.3.0
        with:
          module: .
          args: test        

